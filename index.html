<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>my-tma-store</title>
    <style>
    /* Панель внизу экрана */
    .cart-panel {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        background: #3390ec;
        color: white;
        padding: 15px;
        border-radius: 12px;
        display: none; /* Скроем пока пусто */
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    /* Модалка со списком */
    .cart-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
    }

    .modal-content {
        background: #1a1a3d;
        margin: 20% auto;
        padding: 20px;
        width: 80%;
        border-radius: 15px;
        color: white;
        border: 1px solid #303060;
    }

    .item-row { 
        display: flex; 
        justify-content: space-between; 
        padding: 10px 0; 
        border-bottom: 1px solid #303060; 
    }

    .close-btn { 
        background: #3390ec; 
        color: white; 
        border: none; 
        padding: 12px; 
        width: 100%; 
        border-radius: 10px; 
        margin-top: 15px; 
    }
</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <div id="cart-panel" class="cart-panel" onclick="toggleCartModal()">
    <div class="cart-info">
        <span id="cart-count">0</span> товаров на <span id="cart-total">0</span> ₽
    </div>
    <div class="cart-icon">🛒</div>
</div>

<div id="cart-modal" class="cart-modal">
    <div class="modal-content">
        <h3>Ваш заказ</h3>
        <div id="cart-items-list"></div>
        <button class="close-btn" onclick="toggleCartModal()">Закрыть</button>
    </div>
</div>
<script>
  const tg = window.Telegram.WebApp;
tg.expand(); // Разворачиваем на весь экран

let cart = {};

// Функция добавления/удаления товара
function updateCart(id, title, price, delta) {
    if (!cart[id]) {
        cart[id] = { title, price, count: 0 };
    }
    
    cart[id].count += delta;
    
    if (cart[id].count <= 0) {
        delete cart[id];
    }
    
    renderUI(id, title, price);
    updateCartPanel();
}

// Обновление плавающей панели и кнопки Telegram
function updateCartPanel() {
    const panel = document.getElementById('cart-panel');
    const countEl = document.getElementById('cart-count');
    const totalEl = document.getElementById('cart-total');
    
    let totalItems = 0;
    let totalPrice = 0;
    let itemsHTML = "";

    for (let id in cart) {
        totalItems += cart[id].count;
        totalPrice += cart[id].price * cart[id].count;
        itemsHTML += `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${cart[id].title} x${cart[id].count}</span>
                <span>${cart[id].price * cart[id].count} ₽</span>
            </div>`;
    }

    if (totalItems > 0) {
        panel.style.display = 'flex';
        countEl.innerText = totalItems;
        totalEl.innerText = totalPrice;
        document.getElementById('cart-items-list').innerHTML = itemsHTML;
        
        tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${totalPrice} ₽)`);
        tg.MainButton.show();
    } else {
        panel.style.display = 'none';
        tg.MainButton.hide();
    }
}

function toggleCartModal() {
    const modal = document.getElementById('cart-modal');
    modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
}

// Отправка данных боту при нажатии основной кнопки
tg.onEvent('mainButtonClicked', () => {
    const data = {
        type: 'cart_order',
        items: cart
    };
    tg.sendData(JSON.stringify(data));
});
</script>
  </body>
</html>
